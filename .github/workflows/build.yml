name: Build Windows Setup and CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller playwright Pillow sv_ttk requests

    - name: Build GUI with PyInstaller (OneDir)
      run: |
        python -m PyInstaller --noconfirm --onedir --noconsole --icon="app.ico" --name "MediaDownloader_GUI" --hidden-import douyin_image_downloader --hidden-import tiktok_downloader --hidden-import auto_updater --hidden-import sv_ttk --collect-all playwright --collect-all PIL --collect-all sv_ttk --clean gui_downloader.py

    - name: Compile Inno Setup Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Build CLI (Douyin)
      run: |
        python -m PyInstaller --noconfirm --onefile --name "douyin-dl" --hidden-import douyin_image_downloader --clean douyin_image_downloader.py

    - name: Build CLI (TikTok)
      run: |
        python -m PyInstaller --noconfirm --onefile --name "tiktok-dl" --hidden-import tiktok_downloader --clean tiktok_downloader.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/MediaDownloader_Setup.exe
          dist/douyin-dl.exe
          dist/tiktok-dl.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
