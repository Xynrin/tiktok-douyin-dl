name: Build Windows Setup and CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller playwright Pillow sv_ttk requests playwright-stealth
        python -m playwright install chromium
        xcopy "$env:USERPROFILE\.cache\ms-playwright" "ms-playwright" /E /H /C /I

    - name: Build GUI with PyInstaller (OneDir)
      run: |
        $stealth_path = (python -c "import playwright_stealth, os; print(os.path.dirname(playwright_stealth.__file__))")
        python -m PyInstaller --noconfirm --onedir --noconsole --icon="app.ico" --name "MediaDownloader_GUI" --hidden-import douyin_image_downloader --hidden-import tiktok_downloader --hidden-import auto_updater --hidden-import sv_ttk --add-data "$stealth_path\js;playwright_stealth\js" --collect-all playwright --collect-all PIL --collect-all sv_ttk --clean gui_downloader.py

    - name: Compile Inno Setup Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Build CLI (Douyin)
      run: |
        $stealth_path = (python -c "import playwright_stealth, os; print(os.path.dirname(playwright_stealth.__file__))")
        python -m PyInstaller --noconfirm --onefile --name "douyin-dl" --hidden-import douyin_image_downloader --add-data "$stealth_path\js;playwright_stealth\js" --clean douyin_image_downloader.py

    - name: Build CLI (TikTok)
      run: |
        $stealth_path = (python -c "import playwright_stealth, os; print(os.path.dirname(playwright_stealth.__file__))")
        python -m PyInstaller --noconfirm --onefile --name "tiktok-dl" --hidden-import tiktok_downloader --add-data "$stealth_path\js;playwright_stealth\js" --clean tiktok_downloader.py

    - name: Compress Setup to ZIP
      run: |
        Compress-Archive -Path dist\MediaDownloader_Setup.exe -DestinationPath MediaDownloader_Windows_Setup.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          MediaDownloader_Windows_Setup.zip
          dist/douyin-dl.exe
          dist/tiktok-dl.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
